name: Vibecode / Skid Auto Moderation

on:
  issues:
    types: [opened, edited]
  pull_request_target:
    types: [opened, edited]

permissions:
  issues: write
  pull-requests: write

jobs:
  moderate:
    runs-on: ubuntu-latest

    steps:
      - name: Moderate content
        uses: actions/github-script@v7
        with:
          script: |
            const payload = context.payload;

            let title = "";
            let body = "";
            let number = "";
            let type = "";

            if (context.eventName === "issues") {
              title = payload.issue.title || "";
              body = payload.issue.body || "";
              number = payload.issue.number;
              type = "issue";
            } else if (context.eventName === "pull_request_target") {
              title = payload.pull_request.title || "";
              body = payload.pull_request.body || "";
              number = payload.pull_request.number;
              type = "pull_request";
            }

            const content = (title + " " + body).toLowerCase();

            const keywords = ["vibecode", "vibecoded", "skid", "skidded"];

            const found = keywords.some(k => content.includes(k));

            if (!found) {
              console.log("No keywords found.");
              return;
            }

            const username =
              payload.issue?.user?.login ||
              payload.pull_request?.user?.login;

            const mention = `@${username}`;

            const message = `Hello ${mention}, due to you having the words "vibecode", "vibecoded", "skid", or "skidded", I have closed your ${type.replace("_", " ")} as this is incorrect and not vibe coded nor skidded.`;

            // ---------- DELETE ISSUE COMMENTS ----------
            const issueComments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: number
            });

            for (const comment of issueComments.data) {
              const text = (comment.body || "").toLowerCase();
              if (keywords.some(k => text.includes(k))) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: comment.id
                });
                console.log(`Deleted issue comment ${comment.id}`);
              }
            }

            // ---------- DELETE PR REVIEW COMMENTS ----------
            if (type === "pull_request") {
              const reviewComments = await github.rest.pulls.listReviewComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: number
              });

              for (const comment of reviewComments.data) {
                const text = (comment.body || "").toLowerCase();
                if (keywords.some(k => text.includes(k))) {
                  await github.rest.pulls.deleteReviewComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    comment_id: comment.id
                  });
                  console.log(`Deleted PR review comment ${comment.id}`);
                }
              }
            }

            // ---------- POST MODERATION COMMENT ----------
            if (type === "issue") {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: number,
                body: message
              });

              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: number,
                state: "closed"
              });

            } else {
              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: number,
                body: message,
                event: "COMMENT"
              });

              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: number,
                state: "closed"
              });
            }

            console.log(`Moderation completed for #${number}`);
